<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HELIOS - Minimal Test</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #0f0; 
            font-family: monospace; 
            padding: 20px;
        }
        canvas { border: 2px solid #0f0; }
    </style>
</head>
<body>
    <h2>Testing Three.js...</h2>
    <div id="status"></div>
    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        const status = document.getElementById('status');
        
        status.innerHTML += '<p>1. Loading Three.js...</p>';
        
        try {
            const THREE = await import('three');
            status.innerHTML += '<p style="color:#0f0">✓ Three.js loaded (v' + THREE.REVISION + ')</p>';
            
            // Create basic scene
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer();
            
            renderer.setSize(800, 600);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // Add a cube
            const geometry = new THREE.BoxGeometry();
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            
            camera.position.z = 5;
            
            status.innerHTML += '<p style="color:#0f0">✓ Scene created</p>';
            
            // Animate
            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
            
            status.innerHTML += '<p style="color:#0f0">✓ Animation started</p>';
            status.innerHTML += '<p style="color:#ff0">If you see a rotating cube, Three.js is working!</p>';
            
        } catch (e) {
            status.innerHTML += '<p style="color:#f00">✗ Error: ' + e.message + '</p>';
            console.error(e);
        }
    </script>
</body>
</html>
